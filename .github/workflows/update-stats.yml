name: Update README cards
on:
  schedule:
    - cron: "0 */12 * * *" # Runs automatically every 12 hours
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Ensure the destination folder exists
      - name: Create profile directory
        run: mkdir -p profile

      # 1. General Stats Card
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=prageeth-thilakarathna&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&include_all_commits=true&hide=issues,prs,reviews
          token: ${{ secrets.PAT_1 }}

      # 2. Top Languages Card (Public repos only, matching the exact API URL)
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=prageeth-thilakarathna&layout=compact&theme=tokyonight&hide_border=true&langs_count=20&count_private=false
          token: ${{ secrets.PAT_1 }}

      # 3. GitHub Streak Stats Card (Added via secure local curl fetch)
      - name: Generate streak card
        run: |
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=prageeth-thilakarathna&theme=tokyonight&hide_border=true" -o profile/streak.svg

      # 4. Save changes back to your repository
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile/
          git commit -m "Update automated GitHub profile cards" || echo "No changes to commit"
          git push
