name: Update README cards
on:
  schedule:
    - cron: "0 */12 * * *" # Runs automatically every 12 hours
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=prageeth-thilakarathna&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&include_all_commits=true&hide=issues,prs,reviews
          token: ${{ secrets.PAT_1 }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=prageeth-thilakarathna&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&count_private=true
          token: ${{ secrets.PAT_1 }}
